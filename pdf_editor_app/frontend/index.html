<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Text Editor</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <h1>PDF Text Editor</h1>
    <p class="subtitle">Upload a PDF, edit the extracted text, then download a new PDF.</p>

    <section class="panel">
      <label for="fileInput" class="label">Choose PDF</label>
      <input type="file" id="fileInput" accept="application/pdf">
      <div class="actions">
        <button id="loadBtn" type="button">Extract Text</button>
        <button id="downloadBtn" type="button">Download PDF</button>
      </div>
      <p id="status" class="status">Ready.</p>
      <p id="count" class="count"></p>
    </section>

    <section class="panel">
      <label for="editor" class="label">Edit Text</label>
      <textarea id="editor" placeholder="PDF text will appear here..."></textarea>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
